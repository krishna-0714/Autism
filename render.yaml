services:
  - type: web
    name: autism-assist-backend
    env: python
    rootDir: backend_python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn main:app --workers 1 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT"
    healthCheckPath: /health
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: MODEL_SIGNING_KEY
        sync: false
      - key: ALLOW_LEGACY_UNSIGNED_MODELS
        value: "false"
