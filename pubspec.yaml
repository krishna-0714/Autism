name: autism_assist_app
description: A context-aware assistive communication app for autistic individuals - DEMO VERSION
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.1
  crypto: ^3.0.3
  image_picker: ^1.0.7

  shared_preferences: ^2.2.2
  path_provider: ^2.1.5
  image_cropper: ^8.0.2
  

  
  # Local storage (for offline-first)
  sqflite: ^2.3.0
  sqflite_sqlcipher: ^3.0.0
  
  # Notifications
  flutter_local_notifications: ^17.2.3
  
  # Permissions
  permission_handler: ^11.0.1
  
  # WiFi scanning
  wifi_iot: ^0.3.19
  flutter_tts: ^4.2.5

  fl_chart: ^0.69.2
  sqflite_common_ffi: ^2.3.3
  sqlite3_flutter_libs: ^0.5.41

  path: 1.9.0
  get_it: ^9.2.0
  supabase_flutter: ^2.3.4
  otp: 3.1.2
  qr_flutter: ^4.1.0
  mailer: ^6.6.0
  uuid: ^4.5.3
  http: ^1.6.0
  flutter_secure_storage: ^9.0.0
  flutter_dotenv: ^5.1.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - .env
